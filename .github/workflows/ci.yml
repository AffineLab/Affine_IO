name: CI

on:
  push:
    branches:
      - main
      - dev
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  windows:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy

      - name: Cache cargo artifacts
        uses: Swatinem/rust-cache@v2
        with:
          # Only the long-lived branches write the cache; PRs restore read-only so a
          # large target dir never evicts good caches under the 10 GB cap.
          save-if: ${{ github.ref == 'refs/heads/main' || github.ref == 'refs/heads/dev' }}

      - name: Format check
        run: cargo fmt --check

      # Release profile so the gate sees exactly what ships - catches lints that only
      # fire with debug_assertions off (e.g. unused vars behind cfg logs).
      - name: Clippy (release)
        run: cargo clippy --release --workspace --all-targets -- -D warnings

      - name: Tests
        run: cargo test --workspace
